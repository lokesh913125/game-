<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISE UP — Poor to Rich</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c10;--s1:#0d1117;--s2:#161b22;--s3:#21262d;
  --gold:#ffd700;--gold2:#ffb300;--neon:#00ff88;--neon2:#00cc6a;
  --red:#ff4757;--blue:#1e90ff;--purple:#a855f7;--orange:#ff6b35;
  --text:#e6edf3;--muted:#8b949e;--border:#30363d;
  --font-head:'Black Ops One',cursive;
  --font-ui:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);cursor:default;}

/* ── SCREEN SYSTEM ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;}
.screen.active{display:flex;}

/* ══════════════════════════════════════════
   SPLASH / INTRO
══════════════════════════════════════════ */
#splash{background:#000;align-items:center;justify-content:center;gap:0;}
.splash-bg{position:absolute;inset:0;overflow:hidden;}
.splash-bg canvas{width:100%;height:100%;}
.splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;padding:20px;}
.splash-eyebrow{font-family:var(--font-ui);font-size:13px;letter-spacing:6px;color:var(--neon);text-transform:uppercase;animation:fadeIn 1s both;}
.splash-title{font-family:var(--font-head);font-size:clamp(52px,12vw,110px);line-height:.9;
  background:linear-gradient(135deg,#fff 0%,var(--gold) 50%,var(--gold2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;animation:titleDrop .8s cubic-bezier(.2,1.4,.4,1) both .3s;}
.splash-sub{font-family:var(--font-ui);font-size:16px;letter-spacing:3px;color:var(--muted);animation:fadeIn 1s both .6s;}
.splash-name-wrap{animation:fadeIn .8s both .9s;}
.splash-name-wrap label{font-family:var(--font-ui);font-size:12px;letter-spacing:3px;color:var(--muted);display:block;margin-bottom:6px;}
.splash-name-input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;
  padding:12px 20px;color:var(--text);font-family:var(--font-ui);font-size:18px;letter-spacing:2px;
  text-align:center;outline:none;width:240px;}
.splash-name-input:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,255,136,.15);}
.btn-start{margin-top:8px;padding:16px 52px;font-family:var(--font-head);font-size:22px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:4px;
  color:#000;cursor:pointer;transition:all .2s;animation:fadeIn .8s both 1.1s;
  box-shadow:0 0 30px rgba(0,255,136,.4);}
.btn-start:hover{transform:scale(1.04);box-shadow:0 0 50px rgba(0,255,136,.7);}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
@keyframes titleDrop{from{opacity:0;transform:translateY(-40px) scale(.8);}to{opacity:1;transform:none;}}

/* ══════════════════════════════════════════
   HUD BAR (always on top in game screens)
══════════════════════════════════════════ */
#hud{
  position:fixed;top:0;left:0;right:0;height:52px;
  background:rgba(8,12,16,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:none;align-items:center;gap:0;z-index:100;
  padding:0 12px;
}
#hud.visible{display:flex;}
.hud-name{font-family:var(--font-head);font-size:15px;color:var(--gold);letter-spacing:1px;margin-right:12px;white-space:nowrap;}
.hud-stat{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-right:1px solid var(--border);font-family:var(--font-ui);font-size:14px;font-weight:600;white-space:nowrap;}
.hud-stat .lbl{font-size:10px;letter-spacing:1px;color:var(--muted);display:block;line-height:1;}
.hud-stat .val{font-size:15px;line-height:1.2;}
.hs-money .val{color:var(--gold);}
.hs-happy .val{color:var(--neon);}
.hs-health .val{color:var(--red);}
.hs-rep .val{color:var(--blue);}
.hs-day .val{color:var(--purple);}
.hud-rank{margin-left:auto;padding:4px 14px;border-radius:20px;
  font-family:var(--font-head);font-size:13px;letter-spacing:1px;border:1px solid;}
.r0{color:#ff4757;border-color:#ff4757;background:rgba(255,71,87,.12);}
.r1{color:#ff6b35;border-color:#ff6b35;background:rgba(255,107,53,.12);}
.r2{color:#ffd700;border-color:#ffd700;background:rgba(255,215,0,.12);}
.r3{color:var(--neon);border-color:var(--neon);background:rgba(0,255,136,.12);}
.r4{color:#a855f7;border-color:#a855f7;background:rgba(168,85,247,.12);}
.r5{color:#ffd700;border-color:#ffd700;background:rgba(255,215,0,.2);box-shadow:0 0 10px rgba(255,215,0,.3);}

/* ══════════════════════════════════════════
   CITY MAP
══════════════════════════════════════════ */
#cityScreen{background:var(--bg);padding-top:52px;}
.city-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.city-title-bar{padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.city-title{font-family:var(--font-head);font-size:18px;color:var(--text);letter-spacing:1px;}
.city-sub{font-family:var(--font-ui);font-size:13px;color:var(--muted);letter-spacing:1px;}
.city-day-btn{margin-left:auto;padding:8px 20px;font-family:var(--font-head);font-size:14px;letter-spacing:1px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:4px;
  color:#000;cursor:pointer;transition:all .25s;box-shadow:0 0 15px rgba(0,255,136,.2);}
.city-day-btn:hover{box-shadow:0 0 25px rgba(0,255,136,.5);transform:translateY(-1px);}
.city-grid{flex:1;overflow-y:auto;padding:14px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.city-location{background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
.city-location::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .22s;
  background:radial-gradient(circle at center,rgba(0,255,136,.12),transparent 70%);}
.city-location:hover{border-color:var(--neon);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.5);}
.city-location:hover::before{opacity:1;}
.city-location.locked{opacity:.45;cursor:not-allowed;}
.city-location.locked:hover{transform:none;border-color:var(--border);}
.loc-icon{font-size:38px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6));}
.loc-name{font-family:var(--font-head);font-size:13px;letter-spacing:1px;color:var(--text);}
.loc-desc{font-size:11px;color:var(--muted);line-height:1.4;}
.loc-badge{position:absolute;top:8px;right:8px;font-size:10px;padding:2px 7px;
  border-radius:8px;font-family:var(--font-ui);letter-spacing:1px;font-weight:700;}
.lb-work{background:rgba(0,255,136,.15);color:var(--neon);border:1px solid rgba(0,255,136,.3);}
.lb-shop{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
.lb-fun{background:rgba(30,144,255,.15);color:var(--blue);border:1px solid rgba(30,144,255,.3);}
.lb-love{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3);}
.lb-rival{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.lb-locked{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border);}
.loc-req{font-size:10px;color:var(--orange);margin-top:2px;}

/* ══════════════════════════════════════════
   ACTION PANEL (modal-style)
══════════════════════════════════════════ */
#actionPanel{
  position:fixed;inset:0;z-index:200;
  display:none;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
}
#actionPanel.open{display:flex;}
.ap-sheet{
  width:100%;max-width:600px;max-height:80vh;overflow-y:auto;
  background:var(--s1);border:1px solid var(--border);border-radius:14px 14px 0 0;
  padding:20px;
  animation:slideUp .3s cubic-bezier(.2,1,.4,1);
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.ap-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ap-icon{font-size:32px;}
.ap-title{font-family:var(--font-head);font-size:20px;letter-spacing:1px;}
.ap-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.ap-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px;}
.ap-close:hover{color:var(--text);}
.ap-section{margin-bottom:14px;}
.ap-section-title{font-family:var(--font-ui);font-size:11px;letter-spacing:3px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:400px){.action-grid{grid-template-columns:1fr;}}
.act-btn{background:var(--s3);border:1px solid var(--border);border-radius:8px;
  padding:12px;cursor:pointer;text-align:left;transition:all .18s;color:var(--text);}
.act-btn:hover{border-color:var(--neon);background:rgba(0,255,136,.06);transform:translateY(-2px);}
.act-btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}
.act-btn .act-name{font-family:var(--font-ui);font-size:14px;font-weight:700;letter-spacing:.5px;}
.act-btn .act-cost{font-size:11px;margin-top:4px;}
.act-btn .act-cost .pos{color:var(--neon);}
.act-btn .act-cost .neg{color:var(--red);}
.act-btn .act-cost .gold{color:var(--gold);}
.act-btn .act-cost .info{color:var(--muted);}

/* ══════════════════════════════════════════
   MINI GAME SCREENS
══════════════════════════════════════════ */
#miniGameScreen{background:var(--bg);padding-top:52px;align-items:center;justify-content:center;}
.mg-container{width:100%;max-width:480px;padding:16px;display:flex;flex-direction:column;gap:14px;}
.mg-title{font-family:var(--font-head);font-size:24px;letter-spacing:2px;text-align:center;}
.mg-sub{font-size:14px;color:var(--muted);text-align:center;font-family:var(--font-ui);}
/* Tap game */
.tap-area{height:180px;background:var(--s2);border:2px dashed var(--border);border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;transition:all .1s;user-select:none;-webkit-user-select:none;}
.tap-area:active{transform:scale(.97);background:var(--s3);border-color:var(--neon);}
.tap-emoji{font-size:52px;pointer-events:none;}
.tap-count{font-family:var(--font-head);font-size:36px;color:var(--gold);pointer-events:none;}
.tap-hint{font-size:13px;color:var(--muted);font-family:var(--font-ui);pointer-events:none;}
.mg-timer{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.mg-timer-fill{height:100%;border-radius:4px;transition:width .1s linear;background:linear-gradient(90deg,var(--neon),var(--gold));}
/* Delivery game */
.delivery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.del-pkg{height:70px;background:var(--s2);border:2px solid var(--border);border-radius:8px;
  font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;user-select:none;}
.del-pkg:hover{transform:scale(1.05);}
.del-pkg.correct{border-color:var(--neon);background:rgba(0,255,136,.12);animation:pop .2s;}
.del-pkg.wrong{border-color:var(--red);background:rgba(255,71,87,.12);animation:shake .3s;}
@keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
/* Stock game */
.stock-chart{height:120px;background:var(--s2);border-radius:8px;overflow:hidden;position:relative;}
.stock-chart canvas{width:100%;height:100%;}
.mg-result{text-align:center;padding:20px;background:var(--s2);border-radius:10px;border:1px solid var(--border);}
.mg-result .res-earn{font-family:var(--font-head);font-size:32px;color:var(--gold);}
.mg-result .res-sub{color:var(--muted);font-size:14px;margin-top:4px;}
.mg-btn{width:100%;padding:14px;font-family:var(--font-head);font-size:18px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));border:none;border-radius:6px;
  color:#000;cursor:pointer;transition:all .2s;}
.mg-btn:hover{box-shadow:0 0 20px rgba(0,255,136,.4);}
.mg-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.mg-btn.red{background:linear-gradient(135deg,var(--red),#c0392b);color:#fff;}

/* ══════════════════════════════════════════
   RIVAL SCREEN
══════════════════════════════════════════ */
#rivalScreen{background:var(--bg);padding-top:52px;}
.rival-wrap{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.rival-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:16px;
  display:flex;align-items:center;gap:14px;}
.rival-avatar{font-size:42px;flex-shrink:0;}
.rival-info{flex:1;}
.rival-name{font-family:var(--font-head);font-size:16px;letter-spacing:1px;}
.rival-desc{font-size:12px;color:var(--muted);margin-top:3px;}
.rival-wealth{font-family:var(--font-ui);font-size:13px;font-weight:700;color:var(--gold);margin-top:5px;}
.rival-status{font-size:11px;margin-top:3px;}
.rival-actions{display:flex;flex-direction:column;gap:6px;}
.rv-btn{padding:8px 14px;border-radius:6px;font-family:var(--font-ui);font-size:13px;font-weight:700;
  cursor:pointer;border:1px solid;transition:all .18s;white-space:nowrap;letter-spacing:.5px;}
.rv-btn.challenge{background:rgba(255,71,87,.12);border-color:rgba(255,71,87,.4);color:var(--red);}
.rv-btn.challenge:hover{background:rgba(255,71,87,.25);}
.rv-btn.ally{background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.3);color:var(--neon);}
.rv-btn.ally:hover{background:rgba(0,255,136,.2);}
.rv-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ══════════════════════════════════════════
   LOVE SCREEN
══════════════════════════════════════════ */
#loveScreen{background:var(--bg);padding-top:52px;}
.love-wrap{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;}
.love-status-card{background:linear-gradient(135deg,rgba(255,71,87,.1),rgba(168,85,247,.1));
  border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:16px;text-align:center;}
.love-heart{font-size:40px;animation:heartbeat 1.5s infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.love-person-name{font-family:var(--font-head);font-size:20px;color:var(--red);letter-spacing:1px;margin-top:6px;}
.love-meter-wrap{margin:10px 0;}
.love-meter-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;}
.love-meter-track{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;}
.love-meter-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--red),var(--purple));transition:width .4s;}
.love-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.love-act{background:var(--s3);border:1px solid var(--border);border-radius:8px;
  padding:12px;cursor:pointer;text-align:center;transition:all .18s;}
.love-act:hover{border-color:var(--red);background:rgba(255,71,87,.06);}
.love-act:disabled{opacity:.4;cursor:not-allowed;}
.love-act .la-icon{font-size:24px;}
.love-act .la-name{font-family:var(--font-ui);font-size:13px;font-weight:700;margin-top:4px;}
.love-act .la-cost{font-size:11px;color:var(--muted);margin-top:2px;}
.la-cost .neg{color:var(--red);}.la-cost .pos{color:var(--neon);}
.love-person-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .18s;}
.love-person-card:hover{border-color:rgba(255,71,87,.5);}
.lp-avatar{font-size:36px;}
.lp-name{font-family:var(--font-head);font-size:15px;letter-spacing:1px;}
.lp-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.lp-req{font-size:11px;color:var(--orange);margin-top:3px;}

/* ══════════════════════════════════════════
   SHOP SCREEN
══════════════════════════════════════════ */
#shopScreen{background:var(--bg);padding-top:52px;}
.shop-wrap{flex:1;overflow-y:auto;padding:14px;}
.shop-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid var(--border);}
.scat-btn{padding:6px 14px;border-radius:20px;font-family:var(--font-ui);font-size:13px;font-weight:600;
  letter-spacing:.5px;border:1px solid var(--border);background:var(--s3);color:var(--muted);cursor:pointer;transition:all .18s;}
.scat-btn.on{background:rgba(255,215,0,.15);border-color:var(--gold);color:var(--gold);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.shop-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:13px;display:flex;flex-direction:column;gap:5px;position:relative;transition:all .18s;}
.shop-card:hover{border-color:rgba(255,215,0,.3);transform:translateY(-2px);}
.shop-card.owned{border-color:rgba(0,255,136,.35);background:rgba(0,255,136,.02);}
.sc-emoji{font-size:32px;text-align:center;}
.sc-name{font-family:var(--font-ui);font-size:13px;font-weight:700;letter-spacing:.5px;}
.sc-desc{font-size:11px;color:var(--muted);line-height:1.4;}
.sc-price{font-size:13px;font-weight:700;color:var(--gold);}
.sc-fx{font-size:10px;color:var(--neon);line-height:1.5;}
.sc-badge{position:absolute;top:7px;right:7px;font-size:9px;padding:1px 6px;border-radius:6px;
  font-family:var(--font-ui);font-weight:700;letter-spacing:1px;}
.scb-own{background:rgba(0,255,136,.2);color:var(--neon);border:1px solid rgba(0,255,136,.4);}
.scb-lock{background:rgba(139,148,158,.1);color:var(--muted);border:1px solid var(--border);}
.sc-buy-btn{padding:7px;border-radius:5px;font-family:var(--font-ui);font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid;transition:all .15s;letter-spacing:.5px;margin-top:2px;}
.sc-buy-btn.can{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:var(--gold2);color:#000;}
.sc-buy-btn.can:hover{box-shadow:0 0 12px rgba(255,215,0,.4);}
.sc-buy-btn.cant{background:transparent;border-color:var(--border);color:var(--muted);cursor:not-allowed;}
.sc-use-btn{padding:7px;border-radius:5px;font-family:var(--font-ui);font-size:12px;font-weight:700;
  cursor:pointer;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);color:var(--neon);transition:all .15s;}
.sc-use-btn:hover{background:rgba(0,255,136,.2);}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(0);
  background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:10px 22px;font-family:var(--font-ui);font-size:14px;font-weight:600;
  pointer-events:none;opacity:0;transition:opacity .25s, transform .25s;z-index:999;
  white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.6);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
#toast.pos{border-color:var(--neon);color:var(--neon);}
#toast.neg{border-color:var(--red);color:var(--red);}
#toast.gold{border-color:var(--gold);color:var(--gold);}
#toast.purple{border-color:var(--purple);color:var(--purple);}

/* ══════════════════════════════════════════
   STORY / EVENT MODAL
══════════════════════════════════════════ */
#storyModal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);backdrop-filter:blur(6px);padding:16px;}
#storyModal.open{display:flex;}
.sm-box{width:100%;max-width:480px;background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:22px;animation:fadeIn .3s both;}
.sm-tag{display:inline-block;font-family:var(--font-ui);font-size:11px;letter-spacing:2px;
  padding:3px 10px;border-radius:12px;margin-bottom:10px;font-weight:700;}
.sm-tag.work{background:rgba(0,255,136,.15);color:var(--neon);border:1px solid rgba(0,255,136,.3);}
.sm-tag.event{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3);}
.sm-tag.story{background:rgba(30,144,255,.15);color:var(--blue);border:1px solid rgba(30,144,255,.3);}
.sm-tag.love{background:rgba(255,71,87,.15);color:var(--red);border:1px solid rgba(255,71,87,.3);}
.sm-tag.rival{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3);}
.sm-text{font-size:15px;line-height:1.7;color:var(--text);margin-bottom:16px;}
.sm-choices{display:flex;flex-direction:column;gap:8px;}
.sm-choice{background:var(--s3);border:1px solid var(--border);border-radius:8px;
  padding:13px 16px;cursor:pointer;text-align:left;transition:all .18s;font-family:var(--font-body);}
.sm-choice:hover{border-color:var(--neon);background:rgba(0,255,136,.06);}
.sm-choice .ch-text{font-size:14px;font-weight:600;color:var(--text);}
.sm-choice .ch-fx{font-size:11px;color:var(--muted);margin-top:4px;}
.ch-fx .pos{color:var(--neon);}.ch-fx .neg{color:var(--red);}.ch-fx .gold{color:var(--gold);}

/* ══════════════════════════════════════════
   GAME OVER
══════════════════════════════════════════ */
#gameOver{background:rgba(0,0,0,.97);align-items:center;justify-content:center;gap:16px;
  flex-direction:column;text-align:center;padding:20px;z-index:500;}
.go-title{font-family:var(--font-head);font-size:clamp(40px,10vw,80px);letter-spacing:3px;}
.go-sub{font-size:16px;color:var(--muted);font-family:var(--font-ui);letter-spacing:2px;}
.go-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:24px 40px;}
.go-money{font-family:var(--font-head);font-size:44px;color:var(--gold);}
.go-stats{font-size:13px;color:var(--muted);margin-top:6px;}

/* ══════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════ */
#bottomNav{position:fixed;bottom:0;left:0;right:0;height:56px;
  background:rgba(8,12,16,.95);backdrop-filter:blur(12px);
  border-top:1px solid var(--border);display:none;align-items:stretch;z-index:100;}
#bottomNav.visible{display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--font-ui);
  font-size:10px;letter-spacing:.5px;transition:color .18s;padding-bottom:4px;}
.nav-btn:hover,.nav-btn.on{color:var(--neon);}
.nav-btn .ni{font-size:20px;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}.
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

(function(){
  var c=document.getElementById('splashCanvas'),ctx=c.getContext('2d'),pts=[];
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<120;i++) pts.push({x:Math.random()*c.width,y:Math.random()*c.height,
    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.5+.5,
    a:Math.random(),gold:Math.random()>.7});
  function draw(){
    c.width=c.width;
    pts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.gold?'rgba(255,215,0,'+p.a*.6+')':'rgba(0,255,136,'+p.a*.3+')';
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ════════════════════════════════════════════
   UTIL FUNCTIONS
════════════════════════════════════════════ */
function fmt(n){
  if(n>=10000000)return'₹'+(n/10000000).toFixed(1)+'Cr';
  if(n>=100000)return'₹'+(n/100000).toFixed(1)+'L';
  if(n>=1000)return'₹'+(n/1000).toFixed(1)+'K';
  return'₹'+Math.floor(n);
}
function cl(v,mn,mx){mn=mn||0;mx=mx||100;return Math.max(mn,Math.min(mx,v));}
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+(type||'');
  clearTimeout(t._t);t._t=setTimeout(function(){t.className='';},2400);
}
function addLog(msg){G.log.unshift({d:G.day,m:msg});if(G.log.length>80)G.log.pop();}

function getRank(){
  var m=G.money;
  if(m<1000)return{l:'BROKE',c:'r0'};
  if(m<20000)return{l:'STRUGGLING',c:'r1'};
  if(m<200000)return{l:'MIDDLE CLASS',c:'r2'};
  if(m<2000000)return{l:'WELL OFF',c:'r3'};
  if(m<20000000)return{l:'RICH',c:'r4'};
  return{l:'ELITE',c:'r5'};
}

function hud(){
  document.getElementById('hudName').textContent=G.name;
  document.getElementById('hudMoney').textContent=fmt(G.money);
  document.getElementById('hudHappy').textContent=G.happy;
  document.getElementById('hudHealth').textContent=G.health;
  document.getElementById('hudRep').textContent=G.rep;
  document.getElementById('hudDay').textContent=G.day;
  var r=getRank();
  var rb=document.getElementById('hudRank');
  rb.textContent=r.l;rb.className='hud-rank '+r.c;
}

function renderCity(){
  var grid=document.getElementById('cityGrid');grid.innerHTML='';
  LOCATIONS.forEach(function(loc){
    var locked=false,lockMsg='';
    if(loc.lockReq){
      if(loc.lockReq.money&&G.money<loc.lockReq.money){locked=true;lockMsg=loc.lockMsg;}
      if(loc.lockReq.skills&&G.skills<loc.lockReq.skills){locked=true;lockMsg=loc.lockMsg;}
    }
    var d=document.createElement('div');
    d.className='city-location'+(locked?' locked':'');
    d.innerHTML='<span class="loc-badge '+loc.badge+'">'+loc.type.toUpperCase()+'</span>'+
      '<div class="loc-icon">'+loc.icon+'</div>'+
      '<div class="loc-name">'+loc.name+'</div>'+
      '<div class="loc-desc">'+loc.desc+'</div>'+
      (locked?'<div class="loc-req">🔒 '+lockMsg+'</div>':'');
    if(!locked){
      d.onclick=function(){visitLocation(loc);};
    }
    grid.appendChild(d);
  });
}

function visitLocation(loc){
  if(loc.fn){
    loc.fn();
    return;
  }
  // Build action panel
  var html='<div class="ap-header">'+
    '<span class="ap-icon">'+loc.icon+'</span>'+
    '<div><div class="ap-title">'+loc.name+'</div><div class="ap-sub">'+loc.desc+'</div></div>'+
    '<button class="ap-close" onclick="closePanel()">✕</button></div>';
  html+='<div class="ap-section"><div class="ap-section-title">What will you do?</div>'+
    '<div class="action-grid">';
  loc.actions.forEach(function(a){
    var locked=false;
    if(a.req){
      if(a.req.skills&&G.skills<a.req.skills)locked=true;
      if(a.req.rep&&G.rep<a.req.rep)locked=true;
      if(a.req.money&&G.money<a.req.money)locked=true;
    }
    html+='<button class="act-btn" '+(locked?'disabled':'')+' onclick="doAction('+LOCATIONS.indexOf(loc)+','+loc.actions.indexOf(a)+');closePanel()">'+
      '<div class="act-name">'+a.name+'</div>'+
      '<div class="act-cost"><span class="'+(locked?'info':'neg')+'">'+a.cost+'</span> → <span class="pos">'+a.earn+'</span></div>'+
      (locked?'<div style="font-size:10px;color:var(--orange);margin-top:3px">🔒 Requirements not met</div>':'')+'</button>';
  });
  html+='</div></div>';
  document.getElementById('apSheet').innerHTML=html;
  document.getElementById('actionPanel').classList.add('open');
}

function doAction(locIdx,actionIdx){
  var loc=LOCATIONS[locIdx];
  var a=loc.actions[actionIdx];
  a.fn();
}

   WORK / SPEND HELPERS
════════════════════════════════════════════ */
function doWork(earn,healthCost,energyCost,skillGain){
  if(G.energy<Math.abs(energyCost||0)){toast('😴 Energy nahi hai! Rest karo.','neg');return;}
  G.money+=earn;
  G.health=cl(G.health+(healthCost||0));
  G.energy=Math.max(0,G.energy+(energyCost||0));
  if(skillGain)G.skills=cl(G.skills+skillGain);
  G.workedToday=true;
  addLog('Work: +'+fmt(earn));
  toast('💰 +'+fmt(earn)+' kamaaya!','gold');
  hud();
}
function spend(cost,happyGain,healthGain,repGain,skillGain,msg){
  if(G.money<cost){toast('💸 Paisa nahi hai!','neg');return;}
  G.money-=cost;
  G.happy=cl(G.happy+(happyGain||0));
  G.health=cl(G.health+(healthGain||0));
  G.rep=cl(G.rep+(repGain||0));
  if(skillGain)G.skills=cl(G.skills+skillGain);
  addLog(msg);
  toast(msg,'pos');
  hud();
}
function setJob(id){
  var j=JOB_DATA[id];
  if(!j)return;
  G.job=id;
  toast('✅ '+j.emoji+' '+j.name+' ban gaye! +'+fmt(j.pay)+'/day','gold');
  addLog('Job: '+j.name);
  hud();
}

  toast('📈 1 share: '+s.n,'pos');hud();

  var s=STOCKS.filter(function(x){return x.id===id;})[0];

  var sp=Math.floor(s.price*(0.8+Math.random()*0.7));

function filterShop(cat){shopCatFilter=cat;}
function renderShop(){
  var catsEl=document.getElementById('shopCats');
  catsEl.innerHTML=SHOP_CATS.map(function(c){
    return '<button class="scat-btn'+(shopCatFilter===c.id?' on':'')+'" onclick="shopFilter(\''+c.id+'\')">'+c.label+'</button>';
  }).join('');
  var items=shopCatFilter==='all'?SHOP_ITEMS:SHOP_ITEMS.filter(function(x){return x.cat===shopCatFilter;});
  var grid=document.getElementById('shopGrid');grid.innerHTML='';
  items.forEach(function(item){
    var owned=G.ownedItems.indexOf(item.id)>=0||item.start;
    var canBuy=!owned&&G.money>=item.p&&item.p>0;
    var d=document.createElement('div');d.className='shop-card'+(owned?' owned':'');
    var badge=owned?'<span class="sc-badge scb-own">✓</span>':(G.money<item.p&&item.p>0?'<span class="sc-badge scb-lock">🔒</span>':'');
    var fx='';
    if(item.hb)fx+='<span style="color:var(--neon)">+'+item.hb+' 😊/day</span> ';
    if(item.hlb)fx+='<span style="color:var(--red)">+'+item.hlb+' ❤️/day</span> ';
    if(item.ef&&item.ef.rep)fx+='<span style="color:var(--blue)">+'+item.ef.rep+' rep</span> ';
    var btn=owned
      ?(item.daily?'<button class="sc-use-btn" onclick="useShopItem(\''+item.id+'\')">✨ Use</button>':'<button class="sc-buy-btn cant" disabled>✓ Owned</button>')
      :'<button class="sc-buy-btn '+(canBuy?'can':'cant')+'" '+(canBuy?'':'disabled')+' onclick="buyShopItem(\''+item.id+'\')">'+(canBuy?'Buy':'Can\'t')+'</button>';
    d.innerHTML=badge+'<div class="sc-emoji">'+item.e+'</div><div class="sc-name">'+item.n+'</div>'+
      '<div class="sc-desc">'+item.d+'</div>'+
      '<div class="sc-price">'+(item.p===0?'FREE':fmt(item.p))+'</div>'+
      (fx?'<div class="sc-fx">'+fx+'</div>':'')+btn;
    grid.appendChild(d);
  });
}
function shopFilter(cat){shopCatFilter=cat;renderShop();}
function buyShopItem(id){
  var item=SHOP_ITEMS.filter(function(x){return x.id===id;})[0];
  if(!item||G.ownedItems.indexOf(id)>=0)return;
  if(G.money<item.p){toast('💸 Paisa nahi!','neg');return;}
  G.money-=item.p;G.ownedItems.push(id);
  if(item.ef){
    if(item.ef.happy)G.happy=cl(G.happy+item.ef.happy);
    if(item.ef.health)G.health=cl(G.health+item.ef.health);
    if(item.ef.rep)G.rep=cl(G.rep+item.ef.rep);
    if(item.ef.skills)G.skills=cl(G.skills+item.ef.skills);
  }
  addLog('Bought: '+item.e+' '+item.n);
  toast(item.e+' '+item.n+' kharida! 🎉','gold');hud();renderShop();
}
function useShopItem(id){
  var item=SHOP_ITEMS.filter(function(x){return x.id===id;})[0];
  if(!item)return;
  if(item.dc&&G.money<item.dc){toast('Paisa nahi!','neg');return;}
  if(item.dc)G.money-=item.dc;
  if(item.ef){
    if(item.ef.happy)G.happy=cl(G.happy+item.ef.happy);
    if(item.ef.health)G.health=cl(G.health+item.ef.health);
    if(item.ef.rep)G.rep=cl(G.rep+item.ef.rep);
  }
  toast(item.e+' '+item.n+' use kiya!','pos');hud();
}

  });
  // locked rivals
  RIVALS.filter(function(rv){return rv.req&&G.rep<(rv.req.rep||0);}).forEach(function(rv){
    var d=document.createElement('div');d.className='rival-card';d.style.opacity='.5';
    d.innerHTML='<div class="rival-avatar">🔒</div><div class="rival-info"><div class="rival-name">???</div><div class="rival-desc">'+rv.desc.substring(0,20)+'...</div><div class="loc-req">🔒 Rep '+rv.req.rep+'+ to unlock</div></div>';
    wrap.appendChild(d);
  });
}
function challengeRival(id){
  var rv=RIVALS.filter(function(x){return x.id===id;})[0];
  var win=G.money>rv.wealth*0.7&&G.skills>40;
  var earn=Math.floor(rv.wealth*0.1);
  if(win){
    G.money+=earn;G.rep=cl(G.rep+20);
    G.rivals[id]={status:'enemy'};
    showStoryModal('rival','Tu jeet gaya! '+rv.name+' haara. Usne tujhe gift kiya '+fmt(earn)+'. But ab wo tera permanent dushman hai.',
      [{t:'😤 Accept karo',e:{money:0},fx:'Challenge done!'}]);
    addLog('Rival beaten: '+rv.name);toast('⚔️ '+rv.name+' haara! +'+fmt(earn),'gold');
  } else {
    G.money=Math.max(0,G.money-2000);G.happy=cl(G.happy-10);
    G.rivals[id]={status:'enemy'};
    toast('😤 Tujhe lose karna pada... -₹2000','neg');addLog('Rival loss: '+rv.name);
  }
  G.rivalActToday[id]=true;hud();renderRivals();
}
function allyRival(id){
  var rv=RIVALS.filter(function(x){return x.id===id;})[0];
  if(G.money<5000){toast('Alliance ke liye ₹5K minimum chahiye','neg');return;}
  G.money-=5000;G.rep=cl(G.rep+15);
  G.rivals[id]={status:'ally'};
  G.rivalActToday[id]=true;
  toast('🤝 '+rv.name+' ab tera ally hai! +15 rep','pos');addLog('Ally: '+rv.name);hud();renderRivals();
}

   LOVE
════════════════════════════════════════════ */
function renderLove(){
  var wrap=document.getElementById('loveWrap');wrap.innerHTML='';
  var titleDiv=document.createElement('div');
  titleDiv.style.cssText='font-family:var(--font-head);font-size:20px;letter-spacing:2px;padding:12px 0 4px;color:var(--red)';
  titleDiv.textContent='💘 RELATIONSHIPS';wrap.appendChild(titleDiv);

  if(G.love.partner){
    var p=LOVE_PEOPLE.filter(function(x){return x.id===G.love.partner;})[0];
    var stageName=['💔 Single','💞 Dating','💍 Married'][G.love.stage]||'Dating';
    // Status card
    var sc=document.createElement('div');sc.className='love-status-card';
    sc.innerHTML='<div class="love-heart">'+p.avatar+'</div>'+
      '<div class="love-person-name">'+p.name+'</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">'+stageName+' · '+p.trait+'</div>'+
      '<div class="love-meter-wrap"><div class="love-meter-label"><span>Bond</span><span>'+G.love.meter+'/100</span></div>'+
      '<div class="love-meter-track"><div class="love-meter-fill" style="width:'+G.love.meter+'%"></div></div></div>';
    wrap.appendChild(sc);
    // Actions
    var grid=document.createElement('div');grid.className='love-action-grid';
    var acts=[
      {icon:'🌹',name:'Send Flowers',cost:'-₹1000',efCost:1000,meterGain:8,txt:'Flowers bheje! +8 bond'},
      {icon:'🍽️',name:'Date Night',cost:'-₹3000',efCost:3000,meterGain:15,txt:'Date raat! +15 bond'},
      {icon:'🎁',name:'Surprise Gift',cost:'-₹5000',efCost:5000,meterGain:20,txt:'Gift surprise! +20 bond'},
      {icon:'💬',name:'Sweet Talk',cost:'Free',efCost:0,meterGain:4,txt:'Sweet words! +4 bond'},
      {icon:'🏖️',name:'Weekend Trip',cost:'-₹20000',efCost:20000,meterGain:35,txt:'Trip! +35 bond'},
      {icon:'💍',name:'Propose!',cost:'-₹50000',efCost:50000,meterGain:0,txt:'',special:'propose'},
    ];
    acts.forEach(function(a){
      if(G.love.stage>=2&&a.special==='propose')return;
      if(G.love.stage<1&&a.name!=='Sweet Talk'&&a.name!=='Send Flowers')return;
      var btn=document.createElement('button');btn.className='love-act';
      btn.innerHTML='<div class="la-icon">'+a.icon+'</div><div class="la-name">'+a.name+'</div>'+
        '<div class="la-cost"><span class="neg">'+a.cost+'</span></div>';
      btn.disabled=G.loveActToday||(a.efCost>0&&G.money<a.efCost);
      btn.onclick=function(){loveAction(a);};
      grid.appendChild(btn);
    });
    wrap.appendChild(grid);
  } else {
    // Show single people
    var sDiv=document.createElement('div');
    sDiv.style.cssText='font-size:13px;color:var(--muted);padding:8px 0 12px;font-family:var(--font-ui)';
    sDiv.textContent='You\'re single. Meet someone special:';wrap.appendChild(sDiv);
    LOVE_PEOPLE.forEach(function(p){
      var canMeet=G.rep>=p.reqRep&&G.money>=p.reqMoney;
      var d=document.createElement('div');d.className='love-person-card';
      d.innerHTML='<div class="lp-avatar">'+p.avatar+'</div>'+
        '<div><div class="lp-name">'+p.name+'</div><div class="lp-desc">'+p.desc+'</div>'+
        '<div style="font-size:11px;color:var(--purple);margin-top:2px">'+p.trait+'</div>'+
        (!canMeet?'<div class="lp-req">🔒 Rep '+p.reqRep+'+ · '+fmt(p.reqMoney)+'+ needed</div>':'')+'</div>';
      if(canMeet){d.onclick=function(){meetPerson(p.id);};}
      else{d.style.opacity='.5';}
      wrap.appendChild(d);
    });
  }
}
function meetPerson(id){
  var p=LOVE_PEOPLE.filter(function(x){return x.id===id;})[0];
  G.love={partner:id,meter:20,stage:0};
  toast('💘 '+p.name+' se mulaqat hui! Bond started.','pos');
  addLog('Met: '+p.name);renderLove();
}
function loveAction(a){
  if(a.special==='propose'){
    if(G.love.meter<80){toast('Bond 80+ chahiye propose karne ke liye!','neg');return;}
    if(G.money<50000){toast('₹50K+ chahiye ring ke liye!','neg');return;}
    G.money-=50000;G.love.stage=2;G.love.meter=100;
    var p=LOVE_PEOPLE.filter(function(x){return x.id===G.love.partner;})[0];
    toast('💍 '+p.name+' ne haan keh diya! Shaadi ho gayi! 🎉','gold');
    addLog('Married: '+p.name);
    G.happy=cl(G.happy+30);G.rep=cl(G.rep+20);hud();renderLove();return;
  }
  if(a.efCost>0&&G.money<a.efCost){toast('Paisa nahi!','neg');return;}
  if(a.efCost>0)G.money-=a.efCost;
  G.love.meter=Math.min(100,G.love.meter+a.meterGain);
  G.happy=cl(G.happy+8);
  if(G.love.meter>=60&&G.love.stage===0){
    var pp=LOVE_PEOPLE.filter(function(x){return x.id===G.love.partner;})[0];
    G.love.stage=1;
    showStoryModal('love',pp.name+' tujhe officially date karna chahti/chahta hai! 💘',
      [{t:'💞 Haan ji! Pakka dating!',e:{happy:15,rep:5},fx:'+15 mood +5 rep'}]);
  }
  G.loveActToday=true;
  toast(a.txt,'pos');addLog(a.txt);hud();renderLove();
}

/* ════════════════════════════════════════════
   STORY MODAL
════════════════════════════════════════════ */
function showStoryModal(tag,text,choices){
  var tagLabels={story:'STORY',event:'EVENT',love:'LOVE ❤️',rival:'RIVAL ⚔️',work:'WORK'};
  var html='<span class="sm-tag '+tag+'">'+(tagLabels[tag]||'EVENT')+'</span>'+
    '<p class="sm-text">'+text+'</p>'+
    '<div class="sm-choices">';
  choices.forEach(function(c){
    html+='<button class="sm-choice" onclick="pickChoice('+JSON.stringify(c).replace(/"/g,"'")+');closeModal()">'+
      '<div class="ch-text">'+c.t+'</div>'+
      '<div class="ch-fx">'+fmtFx(c.fx)+'</div></button>';
  });
  html+='</div>';
  document.getElementById('smBox').innerHTML=html;
  document.getElementById('storyModal').classList.add('open');
}
function pickChoice(c){
  var e=c.e||{};
  if(e.money)G.money=Math.max(0,G.money+e.money);
  if(e.happy)G.happy=cl(G.happy+e.happy);
  if(e.health)G.health=cl(G.health+e.health);
  if(e.rep)G.rep=cl(G.rep+e.rep);
  if(e.skills)G.skills=cl(G.skills+e.skills);
  hud();
}
function fmtFx(d){
  if(!d)return'';
  return d.replace(/\+₹[\d,.KLCr]+/g,function(s){return'<span class="pos">'+s+'</span>';})
          .replace(/-₹[\d,.KLCr]+/g,function(s){return'<span class="neg">'+s+'</span>';})
          .replace(/\+\d+\s\w+/g,function(s){return'<span class="pos">'+s+'</span>';})
          .replace(/-\d+\s\w+/g,function(s){return'<span class="neg">'+s+'</span>';})
          .replace(/\+[\w\s]+/g,function(s){return'<span class="gold">'+s+'</span>';});
}

/* CHAI TAPPING GAME */
function miniChaiGame(){
  mgState={type:'chai',taps:0,timeLeft:10,timer:null,done:false};
  function renderChai(){
    document.getElementById('mgContainer').innerHTML=
      '<div class="mg-title">☕ CHAI BANAO!</div>'+
      '<div class="mg-sub">10 seconds mein zyada se zyada tap karo!</div>'+
      '<div class="tap-area" id="tapArea" onclick="mgTap()">'+
      '<div class="tap-emoji">☕</div>'+
      '<div class="tap-count" id="tapCount">0</div>'+
      '<div class="tap-hint">TAP TAP TAP!</div></div>'+
      '<div class="mg-timer"><div class="mg-timer-fill" id="mgTimerFill" style="width:100%"></div></div>'+
      '<div style="font-family:var(--font-ui);font-size:13px;color:var(--muted);text-align:center;margin-top:6px" id="mgTimerTxt">⏱ 10s</div>';
    mgState.timer=setInterval(function(){
      mgState.timeLeft-=0.1;
      var pct=Math.max(0,(mgState.timeLeft/10)*100);
      var tf=document.getElementById('mgTimerFill');
      if(tf)tf.style.width=pct+'%';
      var tt=document.getElementById('mgTimerTxt');
      if(tt)tt.textContent='⏱ '+mgState.timeLeft.toFixed(1)+'s';
      if(mgState.timeLeft<=0){
        clearInterval(mgState.timer);
        var earn=Math.min(2000,mgState.taps*15);
        G.money+=earn;addLog('Chai game: +'+fmt(earn));hud();
        document.getElementById('mgContainer').innerHTML=
          '<div class="mg-title">☕ CHAI READY!</div>'+
          '<div class="mg-result"><div class="res-earn">'+fmt(earn)+'</div>'+
          '<div class="res-sub">'+mgState.taps+' taps → Chai biki!</div></div>'+
          '<button class="mg-btn" onclick="goScreen(\'cityScreen\')">🌆 Back to City</button>';
      }
    },100);
  }
  renderChai();
}
function mgTap(){
  if(mgState.timeLeft<=0)return;
  mgState.taps++;
  var el=document.getElementById('tapCount');
  if(el)el.textContent=mgState.taps;
  // Animate
  var area=document.getElementById('tapArea');
  if(area){area.style.transform='scale(0.96)';setTimeout(function(){area.style.transform='';},80);}
}

/* DELIVERY MATCH GAME */
function miniDeliveryGame(){
  var emojis=['📦','🎁','🛍️','📮','📫','📬','📭','📪'];
  var seq=[];var shown=[];var userSeq=[];var score=0;var round=0;
  function nextRound(){
    round++;
    seq.push(emojis[Math.floor(Math.random()*emojis.length)]);
    shown=seq.slice();
    renderDelivery(true);
    // flash sequence
    var i=0;
    var interval=setInterval(function(){
      if(i>=shown.length){clearInterval(interval);renderDelivery(false);return;}
      var cells=document.querySelectorAll('.del-pkg');
      cells.forEach(function(c){c.classList.remove('correct');});
      var idx=emojis.indexOf(shown[i]);
      if(cells[idx])cells[idx].classList.add('correct');
      i++;
    },600);
  }
  function renderDelivery(showing){
    var shuf=emojis.slice().sort(function(){return Math.random()-.5;});
    document.getElementById('mgContainer').innerHTML=
      '<div class="mg-title">🚚 DELIVERY RUN!</div>'+
      '<div class="mg-sub">'+(showing?'Sequence yaad karo...':'Ab same order mein tap karo!')+' Round '+round+'</div>'+
      '<div class="delivery-grid" id="delGrid">'+
      shuf.map(function(e){return'<div class="del-pkg" onclick="delTap(\''+e+'\')">'+e+'</div>';}).join('')+'</div>'+
      '<div style="font-family:var(--font-head);font-size:18px;color:var(--gold);text-align:center;margin-top:10px">Score: '+score+'</div>';
    window._shuf=shuf;
  }
  window.delTap=function(e){
    var expected=seq[userSeq.length];
    if(e===expected){
      userSeq.push(e);
      var idx=window._shuf.indexOf(e);
      var cells=document.querySelectorAll('.del-pkg');
      if(cells[idx])cells[idx].classList.add('correct');
      if(userSeq.length===seq.length){
        score+=round*50;userSeq=[];
        setTimeout(function(){if(round<5)nextRound();else endDelivery();},500);
      }
    } else {
      var idx2=window._shuf.indexOf(e);
      var cells2=document.querySelectorAll('.del-pkg');
      if(cells2[idx2])cells2[idx2].classList.add('wrong');
      setTimeout(endDelivery,600);
    }
  };
  function endDelivery(){
    var earn=score;G.money+=earn;addLog('Delivery game: +'+fmt(earn));hud();
    document.getElementById('mgContainer').innerHTML=
      '<div class="mg-title">🚚 GAME OVER!</div>'+
      '<div class="mg-result"><div class="res-earn">'+fmt(earn)+'</div>'+
      '<div class="res-sub">Score: '+score+' — '+round+' rounds!</div></div>'+
      '<button class="mg-btn" onclick="goScreen(\'cityScreen\')">🌆 Back to City</button>';
  }
  nextRound();
}

/* CASINO MINI GAME */
function miniCasinoGame(){
  var bet=1000;
  function renderCasino(){
    document.getElementById('mgContainer').innerHTML=
      '<div class="mg-title">🎰 CASINO!</div>'+
      '<div class="mg-sub">Bet wisely. You have '+fmt(G.money)+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0">'+
      [500,1000,5000,10000].map(function(b){
        return'<button class="mg-btn '+(bet===b?'gold':'')+'" style="padding:10px;font-size:14px" onclick="setCasinoBet('+b+')">₹'+b+'</button>';
      }).join('')+'</div>'+
      '<div style="font-family:var(--font-head);font-size:20px;text-align:center;color:var(--gold);margin:8px 0">Bet: '+fmt(bet)+'</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
      '<button class="mg-btn" '+(G.money<bet?'disabled':'')+' onclick="playCasino(\'low\')">LOW<br><small style="font-size:11px">2x win</small></button>'+
      '<button class="mg-btn red" '+(G.money<bet?'disabled':'')+' onclick="playCasino(\'lucky\')">LUCKY 7<br><small style="font-size:11px">5x win</small></button>'+
      '<button class="mg-btn" '+(G.money<bet?'disabled':'')+' onclick="playCasino(\'high\')">HIGH<br><small style="font-size:11px">2x win</small></button></div>'+
      '<button class="mg-btn" style="background:var(--s3);color:var(--muted);margin-top:8px" onclick="goScreen(\'cityScreen\')">← Leave</button>';
    mgState.bet=bet;
  }
  window.setCasinoBet=function(b){bet=b;renderCasino();};
  window.playCasino=function(type){
    if(G.money<bet){toast('Paisa nahi!','neg');return;}
    var roll=Math.random();
    var win=false;
    var multi=2;
    if(type==='low'&&roll<0.48)win=true;
    else if(type==='high'&&roll>0.52)win=true;
    else if(type==='lucky'&&roll>0.8){win=true;multi=5;}
    if(win){
      var earn=bet*multi;G.money+=earn-bet;
      toast('🎰 JACKPOT! +'+fmt(earn),'gold');addLog('Casino win: +'+fmt(earn));
    } else {
      G.money=Math.max(0,G.money-bet);
      toast('😤 Haara -'+fmt(bet),'neg');addLog('Casino loss: -'+fmt(bet));
    }
    hud();renderCasino();
  };
  renderCasino();
}

/* ════════════════════════════════════════════
   END OF DAY
════════════════════════════════════════════ */
function endDay(){
  G.day++;G.age=18+Math.floor(G.day/365);
  G.workedToday=false;G.loveActToday=false;G.rivalActToday={};
  G.energy=Math.min(100,G.energy+40); // rest restores energy

  // Job income
  if(G.job){
    var j=JOB_DATA[G.job];
    if(j){G.money+=j.pay;addLog(j.emoji+' Salary: +'+fmt(j.pay));}
  }

  // Passive income from owned businesses
  var passive=0;
  ['tapri','kirana','salon','gym_biz','hotel','factory','mall'].forEach(function(id){
    if(G.ownedItems.indexOf(id)>=0){
      var inc={tapri:200,kirana:800,salon:1200,gym_biz:3000,hotel:8000,factory:20000,mall:80000}[id]||0;
      passive+=inc;
    }
  });
  if(passive>0){G.money+=passive;addLog('Passive: +'+fmt(passive));}

  // Daily item bonuses
  var dh=0,dhl=0;
  G.ownedItems.forEach(function(id){
    var item=SHOP_ITEMS.filter(function(x){return x.id===id;})[0];
    if(!item)return;
    if(item.hb)dh+=item.hb;
    if(item.hlb)dhl+=item.hlb;
  });
  G.happy=cl(G.happy+dh-3);
  G.health=cl(G.health+dhl-1);

  // Stock fluctuation
  STOCKS.forEach(function(s){s.price=Math.max(5,Math.floor(s.price*(0.88+Math.random()*0.28)));});

  // Ally bonus
  Object.keys(G.rivals).forEach(function(id){
    if(G.rivals[id].status==='ally'){
      G.money+=500;addLog('Ally income: +₹500');
    }
  });

  // Story events
  if(STORY_EVENTS[G.day]){
    var ev=STORY_EVENTS[G.day];
    showStoryModal(ev.tag,ev.text,ev.choices);hud();return;
  }

  // Random events every 5 days
  if(G.day%5===0){
    var rev=RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
    showStoryModal(rev.tag,rev.text,rev.choices);hud();return;
  }

  // Game over checks
  if(G.health<=0){gameOver('💀 DEAD','Sehat ne saath chhod diya...');return;}
  if(G.happy<=0){gameOver('😔 GAVE UP','Khushi khatam ho gayi zindagi se...');return;}
  if(G.money<=0&&G.day>10&&!G.job){gameOver('💸 BANKRUPT','Ek phooTi kaudi nahi bachi...');return;}

  hud();
  var citySubtitles=['New day, new chances.','Har din ek naya mauka.','Grind time!','Make it count.','Keep moving.'];
  document.getElementById('citySubtitle').textContent=citySubtitles[G.day%citySubtitles.length];
  toast('☀️ Din '+G.day+' shuru! Energy: '+G.energy,'pos');
}

function gameOver(title,sub){
  document.getElementById('goTitle').textContent=title;
  document.getElementById('goSub').textContent=sub;
  document.getElementById('goMoney').textContent=fmt(G.money);
  document.getElementById('goStats').textContent='Day '+G.day+' · Age '+G.age+' · '+getRank().l;
  goScreen('gameOver');
  document.getElementById('hud').classList.remove('visible');
  document.getElementById('bottomNav').classList.remove('visible');
}

  var nameInput=document.getElementById('playerNameInput');
  G.name=(nameInput.value.trim()||'Raju').toUpperCase();

}
